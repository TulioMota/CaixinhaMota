<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natal da Família 2025</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const supabase = window.supabase.createClient(
  "https://qqhcigffpxouegvlpcqk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFxaGNpZ2ZmcHhvdWVndmxwY3FrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MzY0ODMsImV4cCI6MjA4NTAxMjQ4M30.8eH2uEnYMKzpQaGBiXRlUf9e_tcQKrih-Kr8SPP6Fjw"
);

const meses = [
  "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
  "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
];

function App() {
  const [participantes, setParticipantes] = React.useState([]);
  const [novoNome, setNovoNome] = React.useState("");

  const hoje = new Date();
  const mesAtual = hoje.getMonth();
  const diaAtual = hoje.getDate();

  React.useEffect(() => {
    carregar();
  }, []);

  async function carregar() {
    const { data } = await supabase
      .from("participantes")
      .select("*");

    const ordenados = (data || []).sort((a, b) =>
      a.nome.localeCompare(b.nome, "pt-BR", { sensitivity: "base" })
    );

    setParticipantes(ordenados);
  }

  async function adicionar() {
    if (!novoNome.trim()) return;

    const pagamentos = {};
    meses.forEach(m => pagamentos[m] = false);

    await supabase.from("participantes").insert({
      nome: novoNome.trim(),
      dias: 1,
      pagamentos
    });

    setNovoNome("");
    carregar();
  }

  async function remover(id) {
    if (!confirm("Deseja remover este participante?")) return;
    await supabase.from("participantes").delete().eq("id", id);
    carregar();
  }

  async function atualizar(id, campo, valor) {
    await supabase.from("participantes")
      .update({ [campo]: valor })
      .eq("id", id);
    carregar();
  }

  function valorMensal(dias) {
    return dias === 1 ? 10 : 20;
  }

  function totalPessoa(p) {
    return Object.values(p.pagamentos)
      .filter(Boolean).length * valorMensal(p.dias);
  }

  function estaAtrasado(indexMes, pago) {
    if (pago) return false;
    if (indexMes < mesAtual) return true;
    if (indexMes === mesAtual && diaAtual > 10) return true;
    return false;
  }

  const totalGeral = participantes.reduce(
    (t, p) => t + totalPessoa(p), 0
  );

  return (
    <div className="max-w-7xl mx-auto p-4">
      <h1 className="text-3xl font-bold text-center mb-2">
        🎄 Natal da Família 2025
      </h1>
      
      <div class="payment-note">
        <strong>📌 Informação para pagamento</strong>
        <p>
          O valor deve ser depositado na conta abaixo:
        </p>
      
        <p class="bank-info">
          <strong>Conta:</strong> Caixinha Mota
        </p>
      
        <p class="pix-info">
          <strong>PIX:(Chave Aleatória)</strong>
          <span class="pix-key">98b0634b-6561-4892-9a06-8d318017b5ad</span>
        </p>
      </div>

      <p className="text-center text-gray-600 mb-4">
        👥 Participantes cadastrados: <strong>{participantes.length}</strong>
      </p>

      <div className="flex gap-2 mb-4">
        <input
          className="border px-3 py-2 flex-1 rounded"
          placeholder="Nome do participante"
          value={novoNome}
          onChange={e => setNovoNome(e.target.value)}
        />
        <button
          onClick={adicionar}
          className="bg-green-600 text-white px-4 rounded hover:bg-green-700"
        >
          ➕ Adicionar
        </button>
      </div>

      <div className="overflow-x-auto bg-white rounded shadow">
        <table className="w-full text-sm">
          <thead className="bg-red-700 text-white">
            <tr>
              <th className="p-2 text-left">Nome</th>
              <th>Dias</th>
              <th>Valor</th>
              {meses.map(m => <th key={m}>{m}</th>)}
              <th>Total</th>
              <th></th>
            </tr>
          </thead>

          <tbody>
            {participantes.map(p => (
              <tr key={p.id} className="border-b hover:bg-gray-50">
                <td className="p-2">
                  <input
                    value={p.nome}
                    onChange={e => atualizar(p.id, "nome", e.target.value)}
                    className="border px-2 py-1 rounded w-full"
                  />
                </td>

                <td className="text-center">
                  <select
                    value={p.dias}
                    onChange={e => atualizar(p.id, "dias", Number(e.target.value))}
                    className="border rounded px-2 py-1"
                  >
                    <option value={1}>1</option>
                    <option value={2}>2</option>
                  </select>
                </td>

                <td className="text-center font-bold text-green-700">
                  R$ {valorMensal(p.dias)}
                </td>

                {meses.map((m, idxMes) => {
                  const pago = p.pagamentos[m];
                  const atrasado = estaAtrasado(idxMes, pago);

                  return (
                    <td
                      key={m}
                      title={atrasado ? "Pagamento atrasado" : ""}
                      className={`text-center cursor-pointer ${
                        atrasado
                          ? "bg-red-200"
                          : pago
                          ? "bg-green-100"
                          : ""
                      }`}
                    >
                      <input
                        type="checkbox"
                        checked={pago}
                        onChange={() =>
                          atualizar(p.id, "pagamentos", {
                            ...p.pagamentos,
                            [m]: !pago
                          })
                        }
                      />
                    </td>
                  );
                })}

                <td className="text-center font-bold">
                  R$ {totalPessoa(p)}
                </td>

                <td className="text-center">
                  <button
                    onClick={() => remover(p.id)}
                    className="text-red-600 hover:text-red-800"
                  >
                    🗑️
                  </button>
                </td>
              </tr>
            ))}
          </tbody>

          <tfoot className="bg-green-700 text-white font-bold">
            <tr>
              <td colSpan={meses.length + 4} className="p-2 text-right">
                TOTAL GERAL:
              </td>
              <td className="text-center text-lg">
                R$ {totalGeral}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div className="mt-4 text-sm text-gray-600">
        🔴 Vermelho = pagamento atrasado (após dia 10) <br />
        🟢 Verde = pagamento realizado
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
