<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Natal da Família 2025</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const supabase = window.supabase.createClient(
  "SUA_PROJECT_URL_AQUI",
  "SUA_ANON_KEY_AQUI"
);

const meses = [
  "Janeiro","Fevereiro","Março","Abril","Maio","Junho",
  "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"
];

function App() {
  const [participantes, setParticipantes] = React.useState([]);
  const [novoNome, setNovoNome] = React.useState("");

  React.useEffect(() => {
    carregar();
  }, []);

  async function carregar() {
    const { data } = await supabase
      .from("participantes")
      .select("*")
      .order("created_at");
    setParticipantes(data || []);
  }

  async function adicionar() {
    if (!novoNome.trim()) return;

    const pagamentos = {};
    meses.forEach(m => pagamentos[m] = false);

    await supabase.from("participantes").insert({
      nome: novoNome,
      dias: 1,
      pagamentos
    });

    setNovoNome("");
    carregar();
  }

  async function remover(id) {
    if (!confirm("Remover participante?")) return;
    await supabase.from("participantes").delete().eq("id", id);
    carregar();
  }

  async function atualizar(id, campo, valor) {
    await supabase.from("participantes")
      .update({ [campo]: valor })
      .eq("id", id);
    carregar();
  }

  function valorMensal(dias) {
    return dias === 1 ? 10 : 20;
  }

  function totalPessoa(p) {
    return Object.values(p.pagamentos).filter(Boolean).length * valorMensal(p.dias);
  }

  const totalGeral = participantes.reduce((t, p) => t + totalPessoa(p), 0);

  return (
    <div className="max-w-6xl mx-auto p-4">
      <h1 className="text-3xl font-bold text-center mb-4">
        🎄 Natal da Família 2025
      </h1>

      <div className="flex gap-2 mb-4">
        <input
          className="border px-3 py-2 flex-1 rounded"
          placeholder="Nome do participante"
          value={novoNome}
          onChange={e => setNovoNome(e.target.value)}
        />
        <button onClick={adicionar}
          className="bg-green-600 text-white px-4 rounded">
          ➕ Adicionar
        </button>
      </div>

      <div className="overflow-x-auto bg-white rounded shadow">
        <table className="w-full text-sm">
          <thead className="bg-red-700 text-white">
            <tr>
              <th className="p-2">Nome</th>
              <th>Dias</th>
              <th>Valor</th>
              {meses.map(m => <th key={m}>{m}</th>)}
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {participantes.map(p => (
              <tr key={p.id} className="border-b">
                <td className="p-2">
                  <input
                    value={p.nome}
                    onChange={e => atualizar(p.id, "nome", e.target.value)}
                    className="border px-2 py-1 rounded w-full"
                  />
                </td>

                <td className="text-center">
                  <select
                    value={p.dias}
                    onChange={e => atualizar(p.id, "dias", Number(e.target.value))}
                    className="border rounded"
                  >
                    <option value={1}>1</option>
                    <option value={2}>2</option>
                  </select>
                </td>

                <td className="text-center font-bold text-green-700">
                  R$ {valorMensal(p.dias)}
                </td>

                {meses.map(m => (
                  <td key={m} className="text-center">
                    <input type="checkbox"
                      checked={p.pagamentos[m]}
                      onChange={() =>
                        atualizar(p.id, "pagamentos", {
                          ...p.pagamentos,
                          [m]: !p.pagamentos[m]
                        })
                      }
                    />
                  </td>
                ))}

                <td className="text-center font-bold">
                  R$ {totalPessoa(p)}
                </td>

                <td>
                  <button
                    onClick={() => remover(p.id)}
                    className="text-red-600"
                  >
                    🗑️
                  </button>
                </td>
              </tr>
            ))}
          </tbody>

          <tfoot className="bg-green-700 text-white font-bold">
            <tr>
              <td colSpan={meses.length + 4} className="p-2 text-right">
                TOTAL:
              </td>
              <td className="text-center text-lg">
                R$ {totalGeral}
              </td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
